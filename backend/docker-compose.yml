version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: univault-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: univault
      POSTGRES_PASSWORD: univault
      POSTGRES_DB: univault
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U univault"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: univault-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://univault:univault@db:5432/univault
      JWT_SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "true"
      ENVIRONMENT: development
    volumes:
      - ./app:/code/app  # Hot reload in development

volumes:
  postgres_data:
